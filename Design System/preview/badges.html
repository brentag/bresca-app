<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Space Grotesk', sans-serif; background: #fff; padding: 24px; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
  .badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 12px; border-radius: 100px; font-size: 12px; font-weight: 600; }
  .badge-green { background: #DCFCE7; color: #16A34A; }
  .badge-blue  { background: #EEF2FF; color: #4338CA; }
  .badge-teal  { background: #CCFBF1; color: #0F766E; }
  .badge-warn  { background: #FEF3C7; color: #D97706; }
  .badge-error { background: #FEE2E2; color: #DC2626; }
  .badge-gray  { background: #F1F5F9; color: #475569; }
  .badge-grad  { background: linear-gradient(135deg,#00C87A,#4B6EF5); color: #fff; }
  .badge-dark  { background: #1A2236; color: #00C87A; border: 1px solid rgba(0,200,122,0.3); }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .section-label { font-size: 10px; font-weight: 600; color: #94A3B8; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }
</style></head><body>
  <div class="section-label">Status Badges</div>
  <div class="row">
    <span class="badge badge-green"><span class="dot"></span>Activo</span>
    <span class="badge badge-warn"><span class="dot"></span>Pendiente</span>
    <span class="badge badge-error"><span class="dot"></span>Error</span>
    <span class="badge badge-gray">Archivado</span>
  </div>
  <div class="section-label">Category Chips</div>
  <div class="row">
    <span class="badge badge-blue">DICOM</span>
    <span class="badge badge-teal">Ecografía</span>
    <span class="badge badge-blue">Tomografía</span>
    <span class="badge badge-green">Laboratorio</span>
    <span class="badge badge-gray">Otro</span>
  </div>
  <div class="section-label">Brand / CRO</div>
  <div class="row">
    <span class="badge badge-grad">Beta</span>
    <span class="badge badge-dark">CRO Ready</span>
    <span class="badge badge-dark" style="color:#4B6EF5;border-color:rgba(75,110,245,0.3)">Anonymized</span>
  </div>
</body></html>
