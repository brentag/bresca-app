<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Space Grotesk', sans-serif; background: #fff; padding: 20px; display: flex; gap: 12px; flex-wrap: wrap; align-items: stretch; }
  .cell { border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; padding: 16px; }
  .cell img { max-height: 64px; object-fit: contain; }
  .cell-label { font-size: 10px; color: #94A3B8; font-weight: 500; text-align: center; }
</style></head><body>
  <div class="cell" style="background:#F8FAFC;border:1px solid #E2E8F0;width:160px">
    <img src="../assets/logo-horizontal-bicolor.png" alt="Horizontal Bicolor">
    <span class="cell-label">Horizontal · Bicolor</span>
  </div>
  <div class="cell" style="background:#0A0A0A;width:160px">
    <img src="../assets/logo-vertical-positive.png" alt="Vertical Positive">
    <span class="cell-label" style="color:#64748B">Vertical · White</span>
  </div>
  <div class="cell" style="background:#F8FAFC;border:1px solid #E2E8F0;width:120px">
    <img src="../assets/logo-vertical-green.png" alt="Vertical Green" style="max-height:80px">
    <span class="cell-label">Vertical · Green</span>
  </div>
  <div class="cell" style="background:#EEF2FF;border:1px solid #C7D2FE;width:120px">
    <img src="../assets/logo-vertical-blue.png" alt="Vertical Blue" style="max-height:80px">
    <span class="cell-label">Vertical · Blue</span>
  </div>
  <div class="cell" style="background:#F8FAFC;border:1px solid #E2E8F0;width:120px">
    <img src="../assets/logo-square.png" alt="Square" style="max-height:80px">
    <span class="cell-label">Square Lockup</span>
  </div>
</body></html>
