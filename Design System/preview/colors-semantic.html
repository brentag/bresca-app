<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Space Grotesk', sans-serif; background: #fff; padding: 20px; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; }
  .swatch { border-radius: 10px; overflow: hidden; width: 130px; }
  .color { height: 60px; display: flex; align-items: flex-end; padding: 8px; }
  .badge { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 100px; background: rgba(255,255,255,0.3); color: #fff; }
  .info { padding: 8px 10px; background: #F8FAFC; }
  .name { font-size: 11px; font-weight: 600; color: #334155; }
  .hex  { font-size: 10px; color: #64748B; font-family: monospace; margin-top: 2px; }
</style></head><body>
<div class="row">
  <div class="swatch">
    <div class="color" style="background:#00C87A"><span class="badge">Success</span></div>
    <div class="info"><div class="name">Success / Green</div><div class="hex">#00C87A</div></div>
  </div>
  <div class="swatch">
    <div class="color" style="background:#F59E0B"><span class="badge">Warning</span></div>
    <div class="info"><div class="name">Warning</div><div class="hex">#F59E0B</div></div>
  </div>
  <div class="swatch">
    <div class="color" style="background:#EF4444"><span class="badge">Error</span></div>
    <div class="info"><div class="name">Error</div><div class="hex">#EF4444</div></div>
  </div>
  <div class="swatch">
    <div class="color" style="background:#4B6EF5"><span class="badge">Info</span></div>
    <div class="info"><div class="name">Info / Blue</div><div class="hex">#4B6EF5</div></div>
  </div>
  <div class="swatch">
    <div class="color" style="background:#111827;border:1px solid #333"><span class="badge">Dark</span></div>
    <div class="info"><div class="name">Dark Surface</div><div class="hex">#111827</div></div>
  </div>
</div>
</body></html>
