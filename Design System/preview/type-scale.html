<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Space Grotesk', sans-serif; background: #fff; padding: 24px 28px; }
  .row { display: flex; align-items: baseline; gap: 16px; margin-bottom: 4px; border-bottom: 1px solid #F1F5F9; padding-bottom: 10px; margin-bottom: 10px; }
  .label { font-size: 10px; font-weight: 600; color: #94A3B8; letter-spacing: 0.08em; text-transform: uppercase; width: 52px; flex-shrink: 0; }
  .spec  { font-size: 10px; color: #94A3B8; font-family: monospace; width: 130px; flex-shrink: 0; }
  .sample { color: #0F172A; }
</style></head><body>
  <div class="row">
    <span class="label">7XL</span>
    <span class="spec">72px / bold / −0.03em</span>
    <span class="sample" style="font-size:52px;font-weight:700;letter-spacing:-0.03em;line-height:1.05">Health Data</span>
  </div>
  <div class="row">
    <span class="label">6XL</span>
    <span class="spec">60px / bold / −0.02em</span>
    <span class="sample" style="font-size:42px;font-weight:700;letter-spacing:-0.02em;line-height:1.1">Autonomy</span>
  </div>
  <div class="row">
    <span class="label">5XL</span>
    <span class="spec">48px / bold / −0.01em</span>
    <span class="sample" style="font-size:34px;font-weight:700;letter-spacing:-0.01em;line-height:1.1">Tus Estudios</span>
  </div>
  <div class="row">
    <span class="label">4XL</span>
    <span class="spec">36px / bold</span>
    <span class="sample" style="font-size:28px;font-weight:700;line-height:1.15">Siempre contigo</span>
  </div>
  <div class="row">
    <span class="label">3XL</span>
    <span class="spec">30px / semibold</span>
    <span class="sample" style="font-size:22px;font-weight:600;line-height:1.2">Portabilidad real</span>
  </div>
  <div class="row">
    <span class="label">Tagline</span>
    <span class="spec">13px / 600 / +0.2em</span>
    <span class="sample" style="font-size:13px;font-weight:600;letter-spacing:0.2em;text-transform:uppercase;color:#00C87A">HEALTH DATA AUTONOMY</span>
  </div>
</body></html>
