<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Space Grotesk', sans-serif; background: #F8FAFC; padding: 24px; }
  .row { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; }
  label { font-size: 12px; font-weight: 600; color: #334155; display: block; margin-bottom: 6px; }
  input, select, textarea { font-family: 'Space Grotesk', sans-serif; font-size: 15px; color: #0F172A; background: #fff; border: 1.5px solid #E2E8F0; border-radius: 8px; padding: 10px 14px; width: 200px; outline: none; transition: border 200ms; }
  input:focus, select:focus { border-color: #00C87A; box-shadow: 0 0 0 3px rgba(0,200,122,0.12); }
  input.error { border-color: #EF4444; }
  input.error:focus { box-shadow: 0 0 0 3px rgba(239,68,68,0.12); }
  .input-group { display: flex; flex-direction: column; }
  .hint { font-size: 11px; color: #64748B; margin-top: 4px; }
  .error-msg { font-size: 11px; color: #EF4444; margin-top: 4px; }
</style></head><body>
  <div class="row">
    <div class="input-group">
      <label>Email</label>
      <input type="email" placeholder="tu@email.com">
    </div>
    <div class="input-group">
      <label>Contraseña</label>
      <input type="password" placeholder="••••••••">
      <span class="hint">Mínimo 8 caracteres</span>
    </div>
    <div class="input-group">
      <label>Nombre del estudio</label>
      <input type="text" class="error" value="Radiografía 2023">
      <span class="error-msg">Este campo es requerido</span>
    </div>
  </div>
  <div class="row">
    <div class="input-group">
      <label>País</label>
      <select><option>Argentina</option><option>México</option><option>Colombia</option></select>
    </div>
    <div class="input-group">
      <label>Notas clínicas</label>
      <textarea style="width:200px;height:72px;resize:none" placeholder="Observaciones…"></textarea>
    </div>
  </div>
</body></html>
