<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Space Grotesk', sans-serif; background: #fff; padding: 20px; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; }
  .swatch { flex: 1; min-width: 90px; border-radius: 10px; overflow: hidden; }
  .color { height: 72px; }
  .info { padding: 8px 10px; background: #F8FAFC; }
  .name { font-size: 11px; font-weight: 600; color: #334155; }
  .hex  { font-size: 10px; color: #64748B; font-family: monospace; margin-top: 2px; }
  .gradient-swatch { height: 72px; border-radius: 10px; }
  .grad-label { font-size: 11px; font-weight: 600; color: #334155; margin-top: 6px; }
  .grad-hex { font-size: 10px; color: #64748B; font-family: monospace; }
</style></head><body>
<div class="row">
  <div class="swatch">
    <div class="color" style="background:#00C87A"></div>
    <div class="info"><div class="name">Green</div><div class="hex">#00C87A</div></div>
  </div>
  <div class="swatch">
    <div class="color" style="background:#33D494"></div>
    <div class="info"><div class="name">Green Light</div><div class="hex">#33D494</div></div>
  </div>
  <div class="swatch">
    <div class="color" style="background:#00A064"></div>
    <div class="info"><div class="name">Green Dark</div><div class="hex">#00A064</div></div>
  </div>
  <div class="swatch">
    <div class="color" style="background:#00B8D4"></div>
    <div class="info"><div class="name">Teal</div><div class="hex">#00B8D4</div></div>
  </div>
  <div class="swatch">
    <div class="color" style="background:#4B6EF5"></div>
    <div class="info"><div class="name">Blue</div><div class="hex">#4B6EF5</div></div>
  </div>
  <div class="swatch">
    <div class="color" style="background:#7090F7"></div>
    <div class="info"><div class="name">Blue Light</div><div class="hex">#7090F7</div></div>
  </div>
  <div class="swatch">
    <div class="color" style="background:#2E52D4"></div>
    <div class="info"><div class="name">Blue Dark</div><div class="hex">#2E52D4</div></div>
  </div>
</div>
<div style="margin-top:14px;">
  <div class="gradient-swatch" style="background:linear-gradient(90deg,#00C87A 0%,#00B8D4 50%,#4B6EF5 100%)"></div>
  <div class="grad-label">Brand Gradient</div>
  <div class="grad-hex">#00C87A → #00B8D4 → #4B6EF5</div>
</div>
</body></html>
