<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Space Grotesk', sans-serif; background: #fff; padding: 20px; }
  .row { display: flex; gap: 8px; }
  .swatch { flex: 1; border-radius: 8px; overflow: hidden; }
  .color { height: 56px; }
  .info { padding: 6px 8px; background: #F8FAFC; }
  .name { font-size: 10px; font-weight: 600; color: #334155; }
  .hex  { font-size: 9px; color: #64748B; font-family: monospace; margin-top: 1px; }
</style></head><body>
<div class="row">
  <div class="swatch"><div class="color" style="background:#F8FAFC;border:1px solid #E2E8F0"></div><div class="info"><div class="name">Gray 50</div><div class="hex">#F8FAFC</div></div></div>
  <div class="swatch"><div class="color" style="background:#F1F5F9;border:1px solid #E2E8F0"></div><div class="info"><div class="name">Gray 100</div><div class="hex">#F1F5F9</div></div></div>
  <div class="swatch"><div class="color" style="background:#E2E8F0"></div><div class="info"><div class="name">Gray 200</div><div class="hex">#E2E8F0</div></div></div>
  <div class="swatch"><div class="color" style="background:#CBD5E1"></div><div class="info"><div class="name">Gray 300</div><div class="hex">#CBD5E1</div></div></div>
  <div class="swatch"><div class="color" style="background:#94A3B8"></div><div class="info"><div class="name">Gray 400</div><div class="hex">#94A3B8</div></div></div>
  <div class="swatch"><div class="color" style="background:#64748B"></div><div class="info"><div class="name">Gray 500</div><div class="hex">#64748B</div></div></div>
  <div class="swatch"><div class="color" style="background:#475569"></div><div class="info"><div class="name">Gray 600</div><div class="hex">#475569</div></div></div>
  <div class="swatch"><div class="color" style="background:#334155"></div><div class="info"><div class="name">Gray 700</div><div class="hex">#334155</div></div></div>
  <div class="swatch"><div class="color" style="background:#1E293B"></div><div class="info"><div class="name">Gray 800</div><div class="hex">#1E293B</div></div></div>
  <div class="swatch"><div class="color" style="background:#0F172A"></div><div class="info"><div class="name">Gray 900</div><div class="hex">#0F172A</div></div></div>
  <div class="swatch"><div class="color" style="background:#0A0A0A"></div><div class="info"><div class="name">Black</div><div class="hex">#0A0A0A</div></div></div>
</div>
</body></html>
