<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bresca — Health Data Autonomy</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Space Grotesk', sans-serif; background: #fff; color: #0F172A; -webkit-font-smoothing: antialiased; }
  :root {
    --green: #00C87A; --blue: #4B6EF5; --teal: #00B8D4;
    --grad: linear-gradient(135deg,#00C87A 0%,#00B8D4 50%,#4B6EF5 100%);
    --gray-50: #F8FAFC; --gray-100: #F1F5F9; --gray-200: #E2E8F0;
    --gray-500: #64748B; --gray-800: #1E293B; --gray-900: #0F172A;
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="Header.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="Features.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>
<script type="text/babel">
const { useState } = React;

function App() {
  const [screen, setScreen] = useState(() => localStorage.getItem('b2c-screen') || 'home');
  const navigate = (s) => { localStorage.setItem('b2c-screen', s); setScreen(s); };

  return (
    <div>
      <B2CHeader navigate={navigate} screen={screen} />
      {screen === 'home' && <><B2CHero navigate={navigate} /><B2CFeatures /></>}
      {screen === 'upload' && <UploadScreen navigate={navigate} />}
      {screen === 'dashboard' && <DashboardScreen navigate={navigate} />}
      <B2CFooter />
    </div>
  );
}

function UploadScreen({ navigate }) {
  return (
    <div style={{minHeight:'80vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--gray-50)'}}>
      <div style={{background:'#fff',borderRadius:16,padding:'48px 40px',boxShadow:'0 8px 32px rgba(0,0,0,0.10)',width:480,textAlign:'center'}}>
        <div style={{width:64,height:64,borderRadius:16,background:'var(--grad)',margin:'0 auto 20px',display:'flex',alignItems:'center',justifyContent:'center'}}>
          <svg width="28" height="28" fill="none" viewBox="0 0 24 24" stroke="#fff" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
        </div>
        <h2 style={{fontSize:24,fontWeight:700,marginBottom:8}}>Subir estudio médico</h2>
        <p style={{color:'var(--gray-500)',fontSize:15,marginBottom:28,lineHeight:1.6}}>Formatos compatibles: DICOM, JPG, PDF, PNG. Máx. 500 MB por archivo.</p>
        <div style={{border:'2px dashed var(--gray-200)',borderRadius:12,padding:'32px 20px',marginBottom:24,cursor:'pointer',transition:'border-color 200ms'}}
          onMouseEnter={e=>e.currentTarget.style.borderColor='var(--green)'}
          onMouseLeave={e=>e.currentTarget.style.borderColor='var(--gray-200)'}>
          <p style={{color:'var(--gray-500)',fontSize:14}}>Arrastra tus archivos aquí o <span style={{color:'var(--green)',fontWeight:600,cursor:'pointer'}}>selecciona desde tu dispositivo</span></p>
        </div>
        <div style={{display:'flex',gap:12}}>
          <button onClick={()=>navigate('dashboard')} style={{flex:1,background:'var(--grad)',color:'#fff',border:'none',borderRadius:100,padding:'12px 0',fontSize:15,fontWeight:600,fontFamily:'inherit',cursor:'pointer'}}>Subir archivo</button>
          <button onClick={()=>navigate('home')} style={{flex:1,background:'var(--gray-100)',color:'var(--gray-800)',border:'none',borderRadius:100,padding:'12px 0',fontSize:15,fontWeight:600,fontFamily:'inherit',cursor:'pointer'}}>Cancelar</button>
        </div>
      </div>
    </div>
  );
}

function DashboardScreen({ navigate }) {
  const studies = [
    {name:'Radiografía Tórax',date:'12 Ene 2024',type:'DICOM',size:'14 MB',color:'#00C87A'},
    {name:'Ecografía Abdominal',date:'5 Nov 2023',type:'DICOM',size:'28 MB',color:'#00B8D4'},
    {name:'Análisis de Sangre',date:'20 Oct 2023',type:'PDF',size:'2 MB',color:'#4B6EF5'},
    {name:'Resonancia Columna',date:'3 Sep 2023',type:'DICOM',size:'180 MB',color:'#4B6EF5'},
  ];
  return (
    <div style={{minHeight:'80vh',background:'var(--gray-50)',padding:'40px 0'}}>
      <div style={{maxWidth:900,margin:'0 auto',padding:'0 24px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:28}}>
          <div>
            <h2 style={{fontSize:26,fontWeight:700}}>Mis Estudios</h2>
            <p style={{color:'var(--gray-500)',fontSize:14,marginTop:4}}>4 estudios guardados</p>
          </div>
          <button onClick={()=>navigate('upload')} style={{background:'var(--grad)',color:'#fff',border:'none',borderRadius:100,padding:'10px 24px',fontSize:14,fontWeight:600,fontFamily:'inherit',cursor:'pointer',display:'flex',alignItems:'center',gap:6}}>
            <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5"><path strokeLinecap="round" strokeLinejoin="round" d="M12 4v16m8-8H4"/></svg>
            Nuevo estudio
          </button>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))',gap:16}}>
          {studies.map((s,i)=>(
            <div key={i} style={{background:'#fff',borderRadius:12,padding:20,boxShadow:'0 2px 8px rgba(0,0,0,0.06)',cursor:'pointer',transition:'box-shadow 200ms,transform 200ms'}}
              onMouseEnter={e=>{e.currentTarget.style.boxShadow='0 8px 24px rgba(0,0,0,0.12)';e.currentTarget.style.transform='translateY(-2px)'}}
              onMouseLeave={e=>{e.currentTarget.style.boxShadow='0 2px 8px rgba(0,0,0,0.06)';e.currentTarget.style.transform='translateY(0)'}}>
              <div style={{width:40,height:40,borderRadius:10,background:s.color,marginBottom:12,display:'flex',alignItems:'center',justifyContent:'center'}}>
                <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="#fff" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
              </div>
              <div style={{fontSize:14,fontWeight:600,marginBottom:4}}>{s.name}</div>
              <div style={{fontSize:12,color:'var(--gray-500)',marginBottom:2}}>{s.date}</div>
              <div style={{display:'flex',gap:6,marginTop:8}}>
                <span style={{fontSize:11,fontWeight:600,padding:'2px 8px',borderRadius:100,background:'#F1F5F9',color:'var(--gray-800)'}}>{s.type}</span>
                <span style={{fontSize:11,color:'var(--gray-500)',padding:'2px 8px'}}>{s.size}</span>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
