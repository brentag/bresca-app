services:
  - type: web
    name: bresca-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: pnpm install && pnpm --filter=@bresca/api build
    startCommand: node apps/api/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: QR_TOKEN_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
