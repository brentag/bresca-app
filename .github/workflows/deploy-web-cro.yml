name: Deploy panel CRO → Hostinger

on:
  push:
    branches: [main]
    paths:
      - 'apps/web-cro/**'
      - 'packages/shared/**'
      - '.github/workflows/deploy-web-cro.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web-cro
        run: pnpm --filter=@bresca/web-cro build
        env:
          VITE_SUPABASE_URL: https://mkacuagcvwxoduhdthwg.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1rYWN1YWdjdnd4b2R1aGR0aHdnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNDg1MzAsImV4cCI6MjA5MjYyNDUzMH0.ik410_XXFlor7Jqs2UO8GDD0IieHE0QJx6b-PDpEYKQ
          VITE_API_URL: https://api-bresca.railway.app

      - name: Add .htaccess
        run: |
          cat > apps/web-cro/dist/.htaccess << 'EOF'
          Options -MultiViews
          RewriteEngine On
          RewriteCond %{REQUEST_FILENAME} !-f
          RewriteRule ^ index.html [QSA,L]
          EOF

      - name: Push dist to deploy branch
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git fetch origin
          if git show-ref --verify --quiet refs/remotes/origin/deploy; then
            git checkout -b deploy origin/deploy
          else
            git checkout --orphan deploy
            git rm -rf . --quiet
          fi
          git rm -rf . --quiet 2>/dev/null || true
          cp -r apps/web-cro/dist/. .
          git add -A
          git diff --staged --quiet || git commit -m "deploy: build $(date +'%Y-%m-%d %H:%M:%S')"
          git push origin deploy
